set -g default-shell /usr/bin/fish

set -g prefix `
unbind C-b
bind ` send-prefix

set -g mouse on
set -g mode-keys vi

# Status line tuned for day-to-day Rust work: session and project context on the
# left, windows in the middle, and command/git/time signals on the right.
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-left-length 70
set -g status-right-length 100

set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[fg=colour109,bg=colour235] #S "
set -g status-right "#{?client_prefix,#[bold,fg=colour220]prefix #[default],}#{?window_zoomed_flag,#[bold,fg=colour214]zoom #[default],}#[fg=colour245]#(/home/inner/.config/tmux/scripts/git-branch \"#{pane_current_path}\") #[fg=colour245]| #[fg=colour109]#{user}@#H #[fg=colour245]| IP: #[fg=colour250]#(/home/inner/.config/tmux/scripts/ip-address) #[fg=colour245]| #[fg=colour250]%Y-%m-%d %H:%M:%S "

set -g window-status-format " #I:#(/home/inner/.config/tmux/scripts/short-path \"#{pane_current_path}\") "
set -g window-status-current-format "#[fg=colour109,bg=colour235] #I:#(/home/inner/.config/tmux/scripts/short-path \"#{pane_current_path}\") "
set -g window-status-separator ""
