[general]
import = [
    "~/.config/alacritty/themes/gruvbox_dark.toml"
]

[font]
# normal = { family = "Iosevka Term Extended" }
normal = { family = "FiraCode Nerd Font Mono" }
size = 12.0

[font.offset]
y = 0

[window]
dynamic_padding = false
title = ":: netrunner ::"
dynamic_title = false

[window.dimensions]
columns = 160
lines = 55

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"

[terminal.shell]
program = "/usr/bin/tmux"
args = ["new-session", "-A", "-s", "main"]

[debug]
log_level = "Error"
